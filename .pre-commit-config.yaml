# Pre-commit hooks for bhAI voice bot.
#
# Setup (one time):
#   pip install pre-commit
#   pre-commit install
#
# Hooks then run automatically on every `git commit`. To run manually:
#   pre-commit run --all-files
#
# To bypass (rarely — only when you know what you're doing):
#   git commit --no-verify

repos:
  # ── Built-in sanity hooks ────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: debug-statements

  # ── Formatting ───────────────────────────────────────────────────
  # Local hooks (not pinned-rev remote repos) so pre-commit runs the SAME
  # black/isort as CI — the ones resolved in uv.lock via `uv run`. A pinned
  # remote rev here would drift from CI's `uv run black` and the two would
  # fight forever (one reformats, the other --check fails). Single source of
  # truth = uv.lock; a `uv lock` bump moves pre-commit AND CI together.
  - repo: local
    hooks:
      - id: black
        name: black
        entry: uv run black
        language: system
        types: [python]
        args: ["--line-length=88"]
        files: ^(src/|inference/|scripts/|benchmarking/scripts/).*\.py$
      - id: isort
        name: isort
        entry: uv run isort
        language: system
        types: [python]
        args: ["--profile", "black", "--line-length=88"]
        files: ^(src/|inference/|scripts/|benchmarking/scripts/).*\.py$

  # ── Type checking (same flags as CI) ─────────────────────────────
  - repo: local
    hooks:
      - id: mypy
        name: mypy (src/bhai)
        entry: uv run mypy src/bhai/ --ignore-missing-imports
        language: system
        types: [python]
        pass_filenames: false
        files: ^src/bhai/.*\.py$

  # ── Test suite (full run — ~0.7s for 194 tests) ──────────────────
  - repo: local
    hooks:
      - id: pytest
        name: pytest (src/tests)
        entry: uv run pytest src/tests/ -q
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-commit]

  # ── Entry-point import smoke (catches half-committed modules) ────
  - repo: local
    hooks:
      - id: import-smoke
        name: import-smoke (webhook entry points)
        entry: uv run python -c "import inference.webhooks.telegram_webhook, inference.webhooks.twilio_webhook, inference.webhooks.nudges, inference.web.chat_server"
        language: system
        types: [python]
        pass_filenames: false
        files: ^(inference/|src/bhai/).*\.py$
